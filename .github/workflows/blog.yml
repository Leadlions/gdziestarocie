name: Daily Blog Post

on:
  schedule:
    # Every day at 07:00 UTC
    - cron: '0 7 * * *'
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/blog_writer/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/blog_writer/requirements.txt

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/blog_writer/generate_post.py

      - name: Commit new post (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'content: daily blog post [bot]'
          file_pattern: src/content/blog/*.md
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
