name: Scrape Antique Fairs

on:
  schedule:
    # 1st of every month at 06:00 UTC
    - cron: '0 6 1 * *'
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/scraper/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scripts/scraper/requirements.txt

      - name: Run scraper
        run: python scripts/scraper/main.py

      - name: Commit updated fairs.json (if changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update fairs data [scraper bot]'
          file_pattern: src/data/fairs.json
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
